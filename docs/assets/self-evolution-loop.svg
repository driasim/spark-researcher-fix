<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Spark Researcher Self-Evolution Loop</title>
  <desc id="desc">A bounded self-evolution loop showing config, run, metric, memory, suggestions, self-edit proposal, human review, and apply or reject.</desc>
  <defs>
    <style>
      .bg { fill: #fcfcfb; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #111111; }
      .subtitle { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2.5; rx: 18; ry: 18; }
      .accent { fill: #fff3e8; stroke: #d97706; stroke-width: 2.5; rx: 18; ry: 18; }
      .review { fill: #eef6ff; stroke: #2563eb; stroke-width: 2.5; rx: 18; ry: 18; }
      .label { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #111111; }
      .body { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .note { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #b45309; }
      .arrow { stroke: #111111; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .soft { stroke: #6b7280; stroke-width: 2.5; fill: none; marker-end: url(#arrowheadSoft); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111111"/>
    </marker>
    <marker id="arrowheadSoft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="60" y="70">Bounded Self-Evolution Loop</text>
  <text class="subtitle" x="60" y="105">Spark can improve a system step by step, but only through explicit scoring, visible artifacts, and reviewable apply paths.</text>

  <rect class="box" x="60" y="150" width="220" height="96"/>
  <text class="label" x="90" y="188">1. Project Spec</text>
  <text class="body" x="90" y="214">Config, commands, metric,</text>
  <text class="body" x="90" y="236">mutable fields, chip path.</text>

  <rect class="box" x="340" y="150" width="220" height="96"/>
  <text class="label" x="370" y="188">2. Run Or Autoloop</text>
  <text class="body" x="370" y="214">Execute one bounded trial</text>
  <text class="body" x="370" y="236">or a small set of trials.</text>

  <rect class="accent" x="620" y="150" width="220" height="96"/>
  <text class="label" x="650" y="188">3. Metric + Ledger</text>
  <text class="body" x="650" y="214">Parse one score and append</text>
  <text class="body" x="650" y="236">an immutable result row.</text>

  <rect class="box" x="900" y="150" width="240" height="96"/>
  <text class="label" x="930" y="188">4. Memory + Watchtower</text>
  <text class="body" x="930" y="214">Sync packets, update memory,</text>
  <text class="body" x="930" y="236">rebuild Obsidian views.</text>

  <rect class="box" x="140" y="340" width="250" height="104"/>
  <text class="label" x="172" y="380">5. Suggest Next Candidates</text>
  <text class="body" x="172" y="406">Kernel or chip proposes the next</text>
  <text class="body" x="172" y="428">bounded mutations to test.</text>

  <rect class="accent" x="470" y="330" width="260" height="124"/>
  <text class="label" x="500" y="372">6. Self-Edit Propose</text>
  <text class="body" x="500" y="398">External coding agent works in</text>
  <text class="body" x="500" y="420">a copied workspace, never the</text>
  <text class="body" x="500" y="442">live repo directly.</text>

  <rect class="review" x="820" y="330" width="260" height="124"/>
  <text class="label" x="850" y="372">7. Human Review</text>
  <text class="body" x="850" y="398">Inspect metric movement, diff,</text>
  <text class="body" x="850" y="420">logs, allowed paths, and packet</text>
  <text class="body" x="850" y="442">truthfulness before apply.</text>

  <rect class="box" x="250" y="560" width="250" height="96"/>
  <text class="label" x="282" y="598">Reject</text>
  <text class="body" x="282" y="624">Nothing mutates in the repo.</text>

  <rect class="accent" x="700" y="560" width="250" height="96"/>
  <text class="label" x="732" y="598">Apply</text>
  <text class="body" x="732" y="624">Copy only allowed files back,</text>
  <text class="body" x="732" y="646">optionally commit and push.</text>

  <path class="arrow" d="M280 198 H340"/>
  <path class="arrow" d="M560 198 H620"/>
  <path class="arrow" d="M840 198 H900"/>
  <path class="arrow" d="M1020 246 V292 H600 V330"/>
  <path class="arrow" d="M470 392 H390"/>
  <path class="arrow" d="M730 392 H820"/>
  <path class="arrow" d="M950 454 V560"/>
  <path class="soft" d="M820 392 H730"/>
  <path class="soft" d="M600 454 V514 H375 V560"/>
  <path class="soft" d="M825 608 H1010 V292 H265 V340"/>

  <text class="note" x="60" y="710">Key constraint: Spark evolves through proposals and measured outcomes, not silent autonomous edits.</text>
</svg>
