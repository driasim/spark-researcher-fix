name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  test-and-audit:
    name: test-and-audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Researcher
        uses: actions/checkout@v6
        with:
          path: spark-researcher

      - name: Require Harness Core repo token
        env:
          SPARK_CI_REPO_TOKEN: ${{ secrets.SPARK_CI_REPO_TOKEN }}
        run: |
          if [ -z "$SPARK_CI_REPO_TOKEN" ]; then
            echo "::error::SPARK_CI_REPO_TOKEN is required to checkout private vibeforge1111/spark-harness-core for authority tests."
            exit 1
          fi

      - name: Checkout Harness Core
        uses: actions/checkout@v6
        with:
          repository: vibeforge1111/spark-harness-core
          ref: codex/genesis-harness-core-20260602
          path: spark-harness-core
          token: ${{ secrets.SPARK_CI_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        working-directory: spark-researcher
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run tests
        working-directory: spark-researcher
        env:
          PYTHONPATH: ${{ github.workspace }}/spark-harness-core/src:${{ github.workspace }}/spark-researcher/src
        run: python -m pytest -q tests

      - name: Compile package, scripts, and tests
        working-directory: spark-researcher
        run: python -m compileall src scripts tests

      - name: Run memory status healthcheck
        working-directory: spark-researcher
        run: python -m spark_researcher.cli memory status --config spark-researcher.project.json

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
